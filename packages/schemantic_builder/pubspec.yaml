name: schemantic_builder
description: A code generator for schemantic that produces type-safe data classes and JSON schemas from abstract definitions.
repository: https://github.com/genkit-ai/genkit-dart
license: Apache-2.0
resolution: workspace
version: 0.1.0-rc.0
environment:
  sdk: ^3.10.0

dependencies:
  analyzer: '>=10.0.0 <14.0.0'
  build: ^4.0.4
  code_builder: ^4.10.0
  dart_style: ^3.1.4
  schemantic: ">=0.1.3 <0.1.4"
  source_gen: ^4.2.0

dev_dependencies:
  build_runner: ^2.10.5
  build_test: ^3.5.5
  json_schema_builder: ^0.1.3
  logging: ^1.3.0
  test: ^1.29.0
