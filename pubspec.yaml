name: genkit_workspace
description: Genkit Dart Monorepo
publish_to: none

environment:
  sdk: ^3.10.0

workspace:
  # NOTE: This list is intentionally incomplete.
  # Packages that depend on flutter are excluded! 
  - packages/_schema_generator
  - packages/genkit
  - packages/genkit_mcp
  - packages/genkit_google_cloud
  - packages/genkit_google_genai
  - packages/genkit_vertexai
  - packages/genkit_vertex_auth
  - packages/genkit_openai
  - packages/genkit_anthropic
  - packages/genkit_shelf
  - packages/genkit_chrome
  - packages/schemantic
  - packages/schemantic_builder
  - packages/genkit_middleware
  - testapps/agents
  - testapps/agentic_patterns
  - testapps/ai_features
  - testapps/basic
  - testapps/chrome_example
  - testapps/openai_sample
  - testapps/mcp_server
  - testapps/middleware
  - testapps/remote_models
  - testapps/gemini
  - testapps/prompts
  - testapps/evals
  - testapps/schemantic_sample

dev_dependencies:
  args: ^2.7.0
  dart_flutter_team_lints: ^3.0.0
  glob: ^2.1.3
  melos: ^7.0.0
  path: ^1.9.1
  pub_semver: ^2.2.0
  test: ^1.30.0
  yaml: ^3.1.2
  
melos:
  name: genkit_workspace
  packages:
    - packages/**
  
  scripts:
    test:
      exec: dart test
      packageFilters:
        dirExists: test

    analyze:
      exec: dart analyze --fatal-infos .

    build-gen:
      run: |
        melos run build-gen-core
        melos run build-gen-plugins
        melos run build-gen-testapps
        dart run tools/apply_license.dart
      description: Run build_runner in topological order (core -> plugins -> app) to avoid race conditions.

    build-gen-core:
      exec: dart run build_runner build
      packageFilters:
        scope: "{schemantic_builder,genkit}"
        orderDependents: true
      description: Run build_runner for genkit.

    build-gen-plugins:
      exec: dart run build_runner build
      packageFilters:
        scope: "{genkit_anthropic,genkit_chrome,genkit_firebase_ai,genkit_google_genai,genkit_mcp,genkit_openai}"
      description: Run build_runner for plugins.

    build-gen-testapps:
      exec: dart run build_runner build
      packageFilters:
        scope: "{agentic_patterns,ai_features,basic_sample,gemini_testapp,mcp_server_sample,openai_sample,schemantic_sample}"
      description: Run build_runner for testapps (except Flutter ones).

    dartdoc-check:
      run: dart tools/check_dartdoc.dart
      description: Run dartdoc over all non-private packages and check for warnings.
