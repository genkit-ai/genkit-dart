name: schemantic_sample
description: A sample application using 3rd-party serializers with Genkit.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  genkit:
    path: ../../packages/genkit
  genkit_google_genai:
    path: ../../packages/genkit_google_genai
  json_annotation: ^4.9.0
  schemantic:
    path: ../../packages/schemantic

dev_dependencies:
  build_runner: ^2.4.9
  json_serializable: ^6.13.0
  lints: ^3.0.0
  test: ^1.24.0

dependency_overrides:
  genkit:
    path: ../../packages/genkit
  genkit_google_genai:
    path: ../../packages/genkit_google_genai
  schemantic:
    path: ../../packages/schemantic
