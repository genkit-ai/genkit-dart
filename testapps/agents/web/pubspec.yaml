name: agents_web
description: >-
  Jaspr web UI for the Genkit Dart agents sample — a port of the JS
  `testapps/agents/web` React + Vite app. Each page is a self-contained sample
  using the `remoteAgent` client from `package:genkit`.
publish_to: none

# This package is intentionally NOT part of the monorepo workspace: it depends
# on Jaspr (a web framework not used elsewhere in the repo). It uses path
# dependencies to the local genkit packages.

environment:
  sdk: ^3.10.0

dependencies:
  genkit: ^0.15.0
  jaspr: ^0.23.0
  jaspr_router: ^0.8.0
  markdown: ^7.0.0
  schemantic: ^0.2.1
  web: ^1.0.0

dev_dependencies:
  build_runner: ^2.10.5
  build_web_compilers: ^4.0.0
  jaspr_builder: ^0.23.0


# Use the in-repo genkit / schemantic sources (this package is outside the
# monorepo workspace because Jaspr is not a workspace dependency).
dependency_overrides:
  genkit:
    path: ../../../packages/genkit
  schemantic:
    path: ../../../packages/schemantic


jaspr:
  mode: client
